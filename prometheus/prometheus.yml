global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "express-app"
    static_configs:
      - targets: ["express-vue-app:3000"]
    metrics_path: /metrics

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    metric_relabel_configs:
      - source_labels: [id]
        regex: "/docker/([a-f0-9]{12}).*"
        target_label: container_short_id
        replacement: "$1"
